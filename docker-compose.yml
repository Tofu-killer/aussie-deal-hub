services:
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "unix_socket_directories="]
    environment:
      POSTGRES_DB: aussie_deals_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d aussie_deals_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    command:
      [
        "sh",
        "-lc",
        "pnpm --filter @aussie-deal-hub/db db:migrate",
      ]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aussie_deals_hub
    depends_on:
      postgres:
        condition: service_healthy
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aussie_deals_hub
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: change-me-to-at-least-16-characters
      EMAIL_FROM: deals@example.com
      SMTP_HOST: smtp-placeholder
      SMTP_PORT: 1025
      WORKER_STATE_PATH: /app/.runtime/worker-state.json
      WORKER_STALE_AFTER_MS: 120000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - worker-state:/app/.runtime
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/v1/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin
    environment:
      NODE_ENV: production
      ADMIN_API_BASE_URL: http://api:3001
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3002/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aussie_deals_hub
      SMTP_HOST: smtp-placeholder
      SMTP_PORT: 1025
      WORKER_POLL_INTERVAL_MS: 30000
      WORKER_REVIEW_ENABLED: 1
      WORKER_PUBLISH_ENABLED: 1
      WORKER_STATE_PATH: /app/.runtime/worker-state.json
      WORKER_STALE_AFTER_MS: 120000
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - worker-state:/app/.runtime
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const fs=require('node:fs'); const p=process.env.WORKER_STATE_PATH; const maxAge=Number(process.env.WORKER_STALE_AFTER_MS||120000); const stat=fs.statSync(p); process.exit(Date.now()-stat.mtimeMs <= maxAge ? 0 : 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  worker-state:
