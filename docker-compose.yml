services:
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "unix_socket_directories="]
    environment:
      POSTGRES_DB: aussie_deals_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aussie_deals_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    command:
      [
        "sh",
        "-lc",
        "pnpm --filter @aussie-deal-hub/db db:push && pnpm --filter @aussie-deal-hub/db seed",
      ]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aussie_deals_hub
    depends_on:
      postgres:
        condition: service_healthy
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aussie_deals_hub
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: change-me-to-at-least-16-characters
      EMAIL_FROM: deals@example.com
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/v1/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      SITE_URL: http://localhost:3000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin
    environment:
      NODE_ENV: production
      ADMIN_API_BASE_URL: http://api:3001
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3002/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
