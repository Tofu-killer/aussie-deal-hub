name: Verify

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aussie_deals_hub
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aussie_deals_hub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm verify

      - name: Prepare database for DB-backed tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/aussie_deals_hub
        run: |
          pnpm --filter @aussie-deal-hub/db db:push
          pnpm --filter @aussie-deal-hub/db seed

      - name: Run DB-backed tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/aussie_deals_hub
        run: pnpm test:db

      - name: Validate compose file
        run: docker compose config

      - name: Build API image target
        run: docker build . --target api

      - name: Build Web image target
        run: docker build . --target web

      - name: Build Admin image target
        run: docker build . --target admin

      - name: Build Worker image target
        run: docker build . --target worker

      - name: Start container stack
        run: docker compose up -d --build

      - name: Run readiness smoke
        run: pnpm smoke:readiness

      - name: Run route smoke
        run: pnpm smoke:routes

      - name: Stop container stack
        if: always()
        run: docker compose down -v
