name: Release bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm verify

      - name: Build release bundle
        env:
          RELEASE_GIT_SHA: ${{ github.sha }}
        run: pnpm release:bundle

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aussie-deal-hub-release-bundle-${{ github.sha }}
          path: release/
          if-no-files-found: error
          include-hidden-files: true

  rehearse:
    needs: bundle
    runs-on: ubuntu-latest

    steps:
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Download release bundle artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aussie-deal-hub-release-bundle-${{ github.sha }}
          path: release-artifact

      - name: Resolve release bundle root
        run: |
          bundle_root="release-artifact"
          if [ ! -f "${bundle_root}/release-manifest.json" ]; then
            bundle_root="$(find release-artifact -mindepth 1 -maxdepth 1 -type d -exec test -f '{}/release-manifest.json' ';' -print)"
          fi
          test -n "${bundle_root}"
          echo "RELEASE_BUNDLE_ROOT=${bundle_root}" >> "${GITHUB_ENV}"

      - name: Install bundle dependencies
        working-directory: ${{ env.RELEASE_BUNDLE_ROOT }}
        run: pnpm install --frozen-lockfile

      - name: Start bundle container stack
        working-directory: ${{ env.RELEASE_BUNDLE_ROOT }}
        run: docker compose up -d --build

      - name: Run bundle container health smoke
        working-directory: ${{ env.RELEASE_BUNDLE_ROOT }}
        run: pnpm smoke:container-health

      - name: Run bundle readiness smoke
        working-directory: ${{ env.RELEASE_BUNDLE_ROOT }}
        run: pnpm smoke:readiness

      - name: Run bundle route smoke
        working-directory: ${{ env.RELEASE_BUNDLE_ROOT }}
        run: pnpm smoke:routes

      - name: Dump bundle container logs on failure
        if: failure()
        working-directory: ${{ env.RELEASE_BUNDLE_ROOT }}
        run: docker compose logs postgres redis db-init api web admin worker

      - name: Stop bundle container stack
        if: always()
        working-directory: ${{ env.RELEASE_BUNDLE_ROOT }}
        run: docker compose down -v
